version: '3.8'

services:

  postgres:
    image: postgres:16-alpine
    container_name: tp_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: catalog_db
    ports:
      - '5435:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tp_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: tp_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - tp_network

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: tp_kafka
    depends_on:
      - zookeeper
    ports:
      - '9092:9092'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - tp_network
    healthcheck:
      test: ['CMD', 'kafka-topics', '--bootstrap-server', 'localhost:9092', '--list']
      interval: 10s
      timeout: 10s
      retries: 5

  

  catalog-service:
    build:
      context: ./catalog-service
      dockerfile: Dockerfile
    container_name: tp_catalog
    ports:
      - '3001:3001'
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/catalog_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tp_network
    restart: unless-stopped

  stock-service:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
    container_name: tp_stock
    ports:
      - '5000:5000'
    environment:
      GRPC_PORT: 5000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stock_db
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tp_network
    restart: unless-stopped

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: tp_order
    ports:
      - '3002:3002'
    environment:
      PORT: 3002
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/order_db
      KAFKA_BROKERS: kafka:29092
      STOCK_SERVICE_URL: stock-service:5000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      stock-service:
        condition: service_started
    networks:
      - tp_network
    restart: unless-stopped

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: tp_notification
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - tp_network
    restart: unless-stopped

  query-service:
    build:
      context: ./query-service
      dockerfile: Dockerfile
    container_name: tp_query
    ports:
      - '3003:3003'
    environment:
      PORT: 3003
      CATALOG_SERVICE_URL: http://catalog-service:3001
      ORDER_SERVICE_URL: http://order-service:3002
    depends_on:
      - catalog-service
      - order-service
    networks:
      - tp_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  tp_network:
    driver: bridge